<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 260px; font-family: Arial, sans-serif; margin: 12px; color: #333; }
    .field { margin-bottom: 10px; }
    label { display: block; font-size: 11px; margin-bottom: 3px; font-weight: bold; }
    input, select, button { width: 100%; padding: 6px; box-sizing: border-box; font-size: 12px; }
    button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 4px; }
    button:hover { background-color: #0056b3; }
    .status { margin-top: 6px; font-size: 11px; color: #28a745; text-align: center; font-weight: bold; }
    .timer-box { margin-top: 8px; padding: 6px; background-color: #f8f9fa; border: 1px solid #dee2e6; text-align: center; font-weight: bold; font-size: 13px; }
    .list-box { max-height: 70px; overflow-y: auto; border: 1px solid #ccc; padding: 4px; font-size: 10px; background: #fff; margin-top: 2px; }
    .row { display: flex; gap: 4px; }
    .row input { flex: 1; }
    .row button { width: auto; margin-top: 0; padding: 6px 12px; background-color: #6c757d; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="field">
    <label>Target Tab to Refresh:</label>
    <select id="target-tab-select">
      <option value="">-- Loading Active Tabs --</option>
    </select>
  </div>

  <div class="field">
    <label>Timing Mode:</label>
    <select id="timing-mode">
      <option value="fixed">Fixed Interval</option>
      <option value="random">Randomized Range</option>
    </select>
  </div>

  <div class="field" id="fixed-container">
    <label>Interval (Minutes):</label>
    <input type="number" id="interval" min="1" step="0.5" value="1">
  </div>

  <div class="field hidden" id="random-container">
    <label>Random Range (Minutes Min - Max):</label>
    <div class="row">
      <input type="number" id="rand-min" min="1" step="0.5" value="1" placeholder="Min">
      <input type="number" id="rand-max" min="2" step="0.5" value="3" placeholder="Max">
    </div>
  </div>
  
  <div class="field">
    <label>Refresh Limit (0 = Infinite):</label>
    <input type="number" id="limit" min="0" value="0">
  </div>

  <div class="field">
    <label>Alert Audio Notification:</label>
    <select id="sound-type">
      <option value="voice_alert">Voice Engine Alert</option>
      <option value="bell">Digital Bell Chime</option>
      <option value="siren">Mechanical Siren</option>
      <option value="beep">Standard Beep</option>
    </select>
  </div>
  
  <div class="field">
    <label>Target Elements:</label>
    <button id="select-element" style="background-color: #28a745; margin-bottom: 6px;">🎯 Target Element by Clicking</button>
    <div class="row">
      <input type="text" id="manual-selector" placeholder="e.g., #price or .status-text">
      <button id="add-manual-selector">Add</button>
    </div>
  </div>

  <label>Selected Selectors Path:</label>
  <div id="selectors-list" class="list-box">None selected yet.</div>

  <button id="start" style="background-color: #007bff; margin-top: 10px;">▶️ Start Monitoring</button>
  <button id="stop" style="background-color: #dc3545;">⏹️ Stop</button>

  <div id="status" class="status"></div>
  <div id="timer-display" class="timer-box" style="display:none;">⏳ Next Refresh: --:--</div>

  <script src="popup.js"></script>
</body>
</html>
